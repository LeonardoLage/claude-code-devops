apiVersion: v1
kind: Service
metadata:
  name: kube-news-svc
  namespace: kube-news
spec:
  type: NodePort
  selector:
    app: kube-news
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: kube-news
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
